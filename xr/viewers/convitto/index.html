<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Convitto Virtuale - WebXR Viewer</title>
    <meta name="description" content="Viewer WebXR per esplorare il convitto virtuale." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.1/dist/aframe-extras.min.js"></script>

    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #overlay {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        max-width: 380px;
        padding: 14px 16px;
        border-radius: 14px;
        color: #f5f5f5;
        background: rgba(10, 10, 10, 0.72);
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 28px rgba(0,0,0,0.35);
        line-height: 1.35;
      }

      #overlay h1 {
        font-size: 18px;
        margin: 0 0 8px 0;
      }

      #overlay p {
        font-size: 14px;
        margin: 4px 0;
      }

      #overlay button {
        margin-top: 10px;
        padding: 7px 10px;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        background: #ffffff;
        color: #111111;
      }

      #status {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 11;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0,0,0,0.72);
        color: white;
        font-size: 14px;
        max-width: 360px;
      }
    </style>
  </head>

  <body>
    <div id="overlay">
      <h1>Convitto virtuale</h1>
      <p><strong>Desktop:</strong> WASD o frecce per muoverti, mouse per guardare.</p>
      <p><strong>Mobile:</strong> trascina per guardare.</p>
      <p><strong>VR:</strong> usa il pulsante VR in basso a destra, se disponibile.</p>
      <button onclick="document.getElementById('overlay').style.display='none'">
        Nascondi istruzioni
      </button>
    </div>

    <div id="status">Viewer attivo. Cerco il modello 3D...</div>

    <a-scene
      renderer="antialias: true; colorManagement: true"
      background="color: #87CEEB"
      vr-mode-ui="enabled: true">

      <!-- Pavimento di test -->
      <a-plane
        id="ground"
        position="0 0 0"
        rotation="-90 0 0"
        width="80"
        height="80"
        color="#777"
        material="roughness: 0.9; metalness: 0.0">
      </a-plane>

      <!-- Oggetti provvisori: servono per capire che il viewer funziona -->
      <a-box
        id="placeholder-box"
        position="0 1 -4"
        rotation="0 45 0"
        width="1.8"
        height="1.8"
        depth="1.8"
        color="#d9b45f">
      </a-box>

      <a-text
        id="placeholder-text"
        value="Viewer WebXR pronto. Ora manca solo models/convitto.glb"
        position="-3 2.8 -4"
        width="6"
        color="#111111"
        align="center">
      </a-text>

      <!-- Qui verrà caricato il convitto, quando esisterà models/convitto.glb -->
      <a-entity
        id="convitto"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1">
      </a-entity>

      <!-- Luci -->
      <a-entity light="type: ambient; intensity: 0.85"></a-entity>
      <a-entity light="type: directional; intensity: 1.1" position="6 12 8"></a-entity>

      <!-- Camera / visitatore -->
      <a-entity
        id="rig"
        position="0 1.6 6"
        movement-controls="fly: false; speed: 0.18">

        <a-entity
          id="camera"
          camera="near: 0.05; far: 5000"
          position="0 0 0"
          look-controls="pointerLockEnabled: true">
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const statusBox = document.querySelector("#status");
      const convitto = document.querySelector("#convitto");
      const placeholderBox = document.querySelector("#placeholder-box");
      const placeholderText = document.querySelector("#placeholder-text");

      const modelPath = "models/convitto.glb";

      async function checkAndLoadModel() {
        try {
          const response = await fetch(modelPath, { method: "HEAD" });

          if (!response.ok) {
            statusBox.textContent = "Viewer funzionante. Manca ancora models/convitto.glb.";
            return;
          }

          convitto.setAttribute("gltf-model", modelPath);
          statusBox.textContent = "Caricamento del modello 3D...";

        } catch (error) {
          statusBox.textContent = "Viewer funzionante. Manca ancora models/convitto.glb.";
          console.warn("Modello non trovato:", error);
        }
      }

      convitto.addEventListener("model-loaded", () => {
        statusBox.textContent = "Modello convitto.glb caricato correttamente.";
        placeholderBox.setAttribute("visible", "false");
        placeholderText.setAttribute("visible", "false");
        setTimeout(() => statusBox.style.display = "none", 1800);
      });

      convitto.addEventListener("model-error", (event) => {
        statusBox.textContent = "Errore: models/convitto.glb esiste, ma non viene caricato correttamente.";
        console.error("Errore caricamento modello:", event);
      });

      checkAndLoadModel();
    </script>
  </body>
</html>
