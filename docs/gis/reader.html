<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>

/* Regole minimizzazione spostate più sotto con selettore open.minimized */

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: monospace;
    }

    #gisFrame {
      width: 100%;
      height: 100%;
      border: 0;
    }

    #readerPanel {
      position: fixed;
      top: 0;
      right: -44vw;
      width: 44vw;
      height: 100dvh;
      background: #080808;
      border-left: 1px solid #39ff14;
      box-shadow: -10px 0 35px rgba(0,0,0,.8);
      z-index: 99999;
      transition: right .25s ease;
    }

    #readerPanel.open {
      right: 0;
    }

    #readerPanel.open.minimized {
      top: 10px;
      right: 10px;
      width: 118px;
      height: 44px;
      overflow: hidden;
      border: 1px solid rgba(57, 255, 20, 0.8);
      box-shadow: 0 0 18px rgba(57, 255, 20, 0.18);
    }

    #readerPanel.open.minimized #storyFrame {
      display: none;
    }

    #readerPanel.open.minimized #readerHeader {
      height: 44px;
      padding: 0 8px;
      border-bottom: 0;
      justify-content: space-between;
      background: #080808;
    }

    #readerPanel.open.minimized #readerClose {
      display: none;
    }

    #readerHeader {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      color: #39ff14;
      border-bottom: 1px solid #222;
      box-sizing: border-box;
    }

    #readerTitle {
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 12px;
    }

    #readerPanel.open.minimized #readerTitle {
      max-width: 64px;
      font-size: 11px;
      padding-right: 4px;
    }

    #readerPanel.open.minimized #readerTitle::after {
      content: "";
    }

    #readerPanel.open.minimized #readerMinimize {
      margin-right: 0;
    }

    #readerClose {
      background: transparent;
      color: #39ff14;
      border: 1px solid #39ff14;
      font-size: 20px;
      cursor: pointer;
      width: 34px;
      height: 34px;
    }

    #storyFrame {
      width: 100%;
      height: calc(100dvh - 54px);
      border: 0;
      background: #fff;
    }

    .story-button {
      margin-top: 8px;
      padding: 6px 10px;
      background: #050505;
      color: #39ff14;
      border: 1px solid #39ff14;
      font-family: monospace;
      cursor: pointer;
    }

    .story-button:hover {

    }

    #readerError {
      position: fixed;
      left: 12px;
      bottom: 12px;
      max-width: 520px;
      padding: 10px 12px;
      background: rgba(20, 0, 0, 0.92);
      color: #ffb3b3;
      border: 1px solid #ff4d4d;
      z-index: 100000;
      font-size: 13px;
      line-height: 1.35;
      display: none;
      white-space: pre-wrap;
    }

    #readerError.visible {
      display: block;
    }



    #cnotOverlay {
      position: fixed;
      top: 22px;
      left: 22px;
      width: min(420px, calc(100vw - 44px));
      z-index: 90000;
      color: #39ff14;
      border: 1px solid rgba(57, 255, 20, 0.75);
      background:
        linear-gradient(rgba(57, 255, 20, 0.05) 50%, rgba(0, 0, 0, 0.05) 50%),
        rgba(0, 10, 0, 0.72);
      background-size: 100% 4px;
      box-shadow: 0 0 22px rgba(57, 255, 20, 0.18), inset 0 0 25px rgba(57, 255, 20, 0.08);
      backdrop-filter: blur(2px);
      pointer-events: none;
      box-sizing: border-box;
    }

    #cnotOverlay::before,
    #cnotOverlay::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: #39ff14;
      border-style: solid;
    }

    #cnotOverlay::before {
      top: -1px;
      left: -1px;
      border-width: 2px 0 0 2px;
    }

    #cnotOverlay::after {
      right: -1px;
      bottom: -1px;
      border-width: 0 2px 2px 0;
    }

    .cnot-overlay-inner {
      padding: 22px 24px 20px;
    }

    .cnot-overlay-kicker {
      font-size: 12px;
      letter-spacing: 0.22em;
      opacity: 0.75;
      margin-bottom: 6px;
    }

    .cnot-overlay-title {
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.65);
      margin-bottom: 10px;

    .cnot-overlay-subtitle {
      font-size: 18px;
      letter-spacing: 0.08em;

      opacity: 0.9;
      margin-bottom: 18px;
    }

    .cnot-overlay-box {
      border: 1px solid rgba(57, 255, 20, 0.55);

      margin-top: 10px;
      font-size: 12px;
      line-height: 1.55;
      text-transform: uppercase;

    .cnot-overlay-muted {

    #cnotStatusOverlay {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 90000;
      color: #39ff14;
      border: 1px solid rgba(57, 255, 20, 0.7);
      background: rgba(0, 10, 0, 0.68);
      box-shadow: 0 0 18px rgba(57, 255, 20, 0.16);
      padding: 12px 16px;
      min-width: 210px;
      font-size: 12px;
      line-height: 1.55;
      text-transform: uppercase;
      pointer-events: none;

    }

    .cnot-led {
      display: inline-block;

      height: 7px;
      border-radius: 50%;
      background: #39ff14;
      box-shadow: 0 0 9px #39ff14;

    .cnot-overlay-head {

    }

    .cnot-overlay-main-title {

    #cnotOverlayToggle {
      flex: 0 0 auto;

      border: 1px solid rgba(57, 255, 20, 0.75);

      font-family: monospace;
      font-size: 18px;

    }

    #cnotOverlayToggle:hover {

    .cnot-overlay-body {
      overflow: hidden;
      transition: max-height .25s ease, opacity .2s ease, margin-top .2s ease;

    }

    body.cnot-overlay-collapsed #cnotOverlay {

    .archive-action-button {

   @media (max-width: 900px) {

<body>

  <iframe id="gisFrame" src="map/index.html"></iframe>

  <section id="cnotOverlay" aria-label="Archive Reader">
    <div class="cnot-overlay-inner">
      <div class="cnot-overlay-head">
        <div class="cnot-overlay-main-title">
          <div class="cnot-overlay-kicker">Archivio geonarrativo</div>
          <div class="cnot-overlay-title">Archive Reader</div>
          <div class="cnot-overlay-subtitle">Query: stories/*.json</div>
        </div>
        <button id="cnotOverlayToggle" type="button" aria-label="Collassa pannello Progetto CNOT" aria-expanded="true">−</button>
      </div>

      <div class="cnot-overlay-body">
        <div class="cnot-overlay-box">
          Archivio attivo:<br />
          CNOT · Europa Quantistica · 2041
        </div>

        <div class="cnot-overlay-box">
          Accesso: civile<br />
          Stato: <span id="archiveQueryStatus">query archivio in attesa</span>
        </div>

        <div class="archive-controls" aria-label="Ricerca e ordinamento archivio">
          <input id="archiveSearchInput" type="search" placeholder="Cerca titolo, autore, luogo, tag…" />
          <select id="archiveSortSelect" aria-label="Ordina archivio">
            <option value="date_desc">Data ↓</option>
            <option value="date_asc">Data ↑</option>
            <option value="title_asc">Titolo A-Z</option>
            <option value="author_asc">Autore A-Z</option>
          </select>
        </div>

        <div class="cnot-overlay-box" id="archiveMetaBox">
          Nessun JSON caricato.
        </div>

        <div class="cnot-overlay-muted">Open archive · contributi narrativi geolocalizzati</div>
      </div>
    </div>
  </section>

  <aside id="cnotStatusOverlay" aria-label="Stato sistema">
    Sistema <span class="cnot-led"></span><br />
    Rete: JSON_ARCHIVES<br />
    Nodi attivi: <span id="archiveNodeCount">0</span>
  </aside>


  <div id="readerError" role="alert"></div>
  
  <button id="storyLaunchButton" type="button">Leggi racconto</button>

  <aside id="readerPanel">
    <div id="readerHeader">
      <div id="readerTitle">Reader</div>
      
      <div>
 	 <button id="readerMinimize" type="button">−</button>
  	<button id="readerClose">×</button>
	</div>
    </div>
    <iframe id="storyFrame"></iframe>
  </aside>

  <script>
    const gisFrame = document.getElementById("gisFrame");
    const readerPanel = document.getElementById("readerPanel");
    const storyFrame = document.getElementById("storyFrame");
    const readerTitle = document.getElementById("readerTitle");
    const readerClose = document.getElementById("readerClose");
    const readerMinimize = document.getElementById("readerMinimize");
    const readerError = document.getElementById("readerError");
    const storyLaunchButton = document.getElementById("storyLaunchButton");
    const cnotOverlayToggle = document.getElementById("cnotOverlayToggle");
    const archiveMetaBox = document.getElementById("archiveMetaBox");
    const archiveQueryStatus = document.getElementById("archiveQueryStatus");
    const archiveNodeCount = document.getElementById("archiveNodeCount");
    const archiveSearchInput = document.getElementById("archiveSearchInput");
    const archiveSortSelect = document.getElementById("archiveSortSelect");

    let popupObserver = null;
    let currentStoryUrl = null;
    let currentStoryTitle = null;
    
    
    readerMinimize.addEventListener("click", () => {
  	readerPanel.classList.toggle("minimized");
  	readerMinimize.textContent = readerPanel.classList.contains("minimized") ? "+" : "−";
	});

    cnotOverlayToggle.addEventListener("click", event => {
      event.preventDefault();
      event.stopPropagation();

      const isCollapsed = document.body.classList.toggle("cnot-overlay-collapsed");

      cnotOverlayToggle.textContent = isCollapsed ? "+" : "−";
      cnotOverlayToggle.setAttribute("aria-expanded", String(!isCollapsed));
      cnotOverlayToggle.setAttribute(
        "aria-label",
        isCollapsed ? "Riapri pannello Progetto CNOT" : "Collassa pannello Progetto CNOT"
      );
    });


    const archiveJsonManifestCandidates = [
      "stories/index.json",
      "stories/manifest.json",
      "stories/stories.json"
    ];

    let archiveItems = [];
    let filteredArchiveItems = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeArchiveItems(raw) {
      if (Array.isArray(raw)) return raw;
      if (Array.isArray(raw?.stories)) return raw.stories;
      if (Array.isArray(raw?.items)) return raw.items;
      if (Array.isArray(raw?.features)) {
        return raw.features.map(feature => ({
          ...(feature.properties || {}),
          coordinates: feature.geometry?.coordinates
        }));
      }
      return [];
    }

    function getArchiveTitle(item) {
      return item.title || item.titolo || item.name || item.nome || item.id || "Senza titolo";
    }

    function getArchiveAuthor(item) {
      return item.author || item.autore || item.creator || item.contributor || "Autore non indicato";
    }

    function getArchiveDate(item) {
      return item.timeline_date || item.date || item.data || item.created_at || item.created || "";
    }

    function getArchivePlace(item) {
      return item.location_name || item.location || item.luogo || item.place || item.city || "";
    }

    function getArchiveTags(item) {
      if (Array.isArray(item.tags)) return item.tags.join(" ");
      return item.tags || item.tag || "";
    }

    function buildArchiveSearchText(item) {
      return [
        getArchiveTitle(item),
        getArchiveAuthor(item),
        getArchiveDate(item),
        getArchivePlace(item),
        getArchiveTags(item),
        item.archive || "",
        item.id || ""
      ].join(" ").toLowerCase();
    }

    function compareArchiveItems(a, b, mode) {
      if (mode === "title_asc") {
        return getArchiveTitle(a).localeCompare(getArchiveTitle(b), "it", { sensitivity: "base" });
      }

      if (mode === "author_asc") {
        return getArchiveAuthor(a).localeCompare(getArchiveAuthor(b), "it", { sensitivity: "base" });
      }

      const dateA = getArchiveDate(a);
      const dateB = getArchiveDate(b);

      if (mode === "date_asc") {
        return String(dateA).localeCompare(String(dateB));
      }

      return String(dateB).localeCompare(String(dateA));
    }

    function applyArchiveFilters() {
      const query = (archiveSearchInput?.value || "").trim().toLowerCase();
      const sortMode = archiveSortSelect?.value || "date_desc";

      filteredArchiveItems = archiveItems
        .filter(item => !query || buildArchiveSearchText(item).includes(query))
        .sort((a, b) => compareArchiveItems(a, b, sortMode));

      renderArchiveItems(filteredArchiveItems, { preserveArchiveItems: true });
    }

    function getArchiveLatLon(item) {
      const rawLat = item.lat ?? item.latitude ?? item.gps_lat ?? item?.gps?.lat;
      const rawLon = item.lon ?? item.lng ?? item.longitude ?? item.gps_lon ?? item?.gps?.lon ?? item?.gps?.lng;

      if (rawLat !== undefined && rawLon !== undefined) {
        const lat = Number(rawLat);
        const lon = Number(rawLon);
        if (Number.isFinite(lat) && Number.isFinite(lon)) return { lat, lon };
      }

      if (Array.isArray(item.coordinates) && item.coordinates.length >= 2) {
        const lon = Number(item.coordinates[0]);
        const lat = Number(item.coordinates[1]);
        if (Number.isFinite(lat) && Number.isFinite(lon)) return { lat, lon };
      }

      return null;
    }

    function getArchiveCoordinates(item) {
      const coords = getArchiveLatLon(item);
      if (!coords) return "Coordinate non indicate";
      return `${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}`;
    }

    function getArchiveStoryUrl(item) {
      return item.story_file || item.story || item.url || item.html || item.content_url || item.artifact_url || "";
    }

    function getMapObject(win) {
      if (!win) return null;

      if (win.map && (typeof win.map.getView === "function" || typeof win.map.setView === "function")) {
        return win.map;
      }

      /*
        qgis2web di solito espone la mappa come window.map.
        Questo fallback serve solo per esportazioni/customizzazioni in cui
        il nome globale sia diverso.
      */
      for (const key of Object.keys(win)) {
        try {
          const candidate = win[key];
          if (candidate && (typeof candidate.getView === "function" || typeof candidate.setView === "function")) {
            return candidate;
          }
        } catch (err) {
          // Alcune proprietà del browser possono lanciare errori: le ignoriamo.
        }
      }

      return null;
    }

   window.gotoGIS = function(lat, lon, zoom) {
  focusMapOnArchiveItem({
    latitude: lat,
    longitude: lon,
    zoom: zoom
  });

  readerPanel.classList.add("minimized");
  readerMinimize.textContent = "+";

  document.body.classList.add("cnot-overlay-collapsed");
  cnotOverlayToggle.textContent = "+";
  cnotOverlayToggle.setAttribute("aria-expanded", "false");
};

    /*window.gotoGIS = function(lat, lon) {
  	focusMapOnArchiveItem({
  	  latitude: lat,
   	 longitude: lon
  	});
	};*/

    function focusMapOnArchiveItem(item) {
      const coords = getArchiveLatLon(item);

      if (!coords) {
        showReaderError(
          "Archivio: coordinate mancanti.",
          "Per usare VAI AL NODO aggiungi latitude/longitude oppure coordinates: [lon, lat] al JSON."
        );
        return;
      }

      const rawZoom = item.zoom ?? item.map_zoom ?? item.zoom_level;
      const parsedZoom = Number(rawZoom);
      const targetZoom = Number.isFinite(parsedZoom) ? parsedZoom : 18;

      const doc = getMapDocument();
      const win = doc?.defaultView || gisFrame.contentWindow;
      const map = getMapObject(win);

      if (!map) {
        showReaderError(
          "Archivio: non riesco a controllare la mappa.",
          "La mappa qgis2web deve essere accessibile nello stesso iframe e, idealmente, esporre una variabile globale map."
        );
        return;
      }

      clearReaderError();

      // OpenLayers / qgis2web
      if (typeof map.getView === "function") {
        const view = map.getView();
        let center = [coords.lon, coords.lat];

        if (win?.ol?.proj?.fromLonLat) {
          center = win.ol.proj.fromLonLat(center);
        }

        if (typeof view.animate === "function") {
          view.animate({ center, zoom: targetZoom, duration: 650 });
        } else {
          view.setCenter(center);
          if (typeof view.setZoom === "function") view.setZoom(targetZoom);
        }

        archiveQueryStatus.textContent = "mappa centrata";
        return;
      }

      // Leaflet, nel caso il progetto venga esportato con template Leaflet.
      if (typeof map.setView === "function") {
        map.setView([coords.lat, coords.lon], targetZoom);
        archiveQueryStatus.textContent = "mappa centrata";
      }
    }

    function renderArchiveItems(items, options = {}) {
      if (!options.preserveArchiveItems) {
        archiveItems = items;
        filteredArchiveItems = [...items];
      }

      archiveNodeCount.textContent = String(archiveItems.length);

      if (!archiveItems.length) {
        archiveQueryStatus.textContent = "nessun record trovato";
        archiveMetaBox.innerHTML = "Nessun JSON trovato in stories/.";
        return;
      }

      if (!items.length) {
        archiveQueryStatus.textContent = "nessun risultato";
        archiveMetaBox.innerHTML = `
          <div class="archive-meta-entry">
            <div class="archive-meta-title">Nessuna traccia compatibile</div>
            <div class="archive-meta-line">Modifica la query o cambia ordinamento.</div>
          </div>

    async function fetchJsonIfExists(url) {
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) return null;
        return await response.json();
      } catch (err) {
        console.warn("[JSON Archive Reader] JSON non leggibile:", url, err);
        return null;
      }
    }

    async function loadArchiveJsons() {
      archiveQueryStatus.textContent = "query in corso";
      archiveMetaBox.innerHTML = "Interrogo stories/index.json…";

      let manifest = null;
      let manifestUrl = "";

      for (const candidate of archiveJsonManifestCandidates) {
        manifest = await fetchJsonIfExists(candidate);
        if (manifest) {
          manifestUrl = candidate;
          break;
        }
      }

      if (!manifest) {
        archiveQueryStatus.textContent = "manifest non trovato";
        archiveMetaBox.innerHTML = `
          <div class="archive-meta-entry">
            <div class="archive-meta-title">Manifest mancante</div>
            <div class="archive-meta-line">Crea stories/index.json con una lista di record o di file JSON.</div>
          </div>
        `;
        return;
      }

      let items = normalizeArchiveItems(manifest);

      const jsonFiles = items
        .map(item => typeof item === "string" ? item : (item.json || item.file || item.path))
        .filter(Boolean)
        .map(path => path.startsWith("stories/") ? path : `stories/${path}`)
        .filter(path => path.toLowerCase().endsWith(".json"));

      if (jsonFiles.length) {
        const loaded = await Promise.all(jsonFiles.map(fetchJsonIfExists));
        items = loaded.filter(Boolean).flatMap(normalizeArchiveItems);
      }

      console.log(`[JSON Archive Reader] Manifest caricato: ${manifestUrl}`, items);
      renderArchiveItems(items);
      applyArchiveFilters();
    }

      const jsonUrl = storyUrl.replace(/\.(html|htm)$/i, ".json");
      const data = await fetchJsonIfExists(jsonUrl);
      if (!data) return;

      const items = normalizeArchiveItems(data);
      const item = items[0] || data;

      archiveQueryStatus.textContent = "nodo selezionato";
      archiveMetaBox.innerHTML = `
        <div class="archive-meta-entry">

          <div class="archive-meta-line">Autore: ${escapeHtml(getArchiveAuthor(item))}</div>

      let clean = String(url)

        .trim();

      const markers = ["stories/", "artifacts/", "media/", "xr/"];

      for (const marker of markers) {
        const idx = clean.indexOf(marker);
        if (idx >= 0) {
          clean = clean.slice(idx);
          break;
        }
      }

      return clean;
    }

    function extractStoryFromPopupText(popupText) {
      if (!popupText) return null;

      const compactText = popupText.replace(/\s+/g, "");
      const urlMatch = compactText.match(/stories\/[^"'<> ]+\.(html|htm)/i);

      if (!urlMatch) return null;

      const url = urlMatch[0];

      /*
        Firma consigliata nel GeoJSON:
        reader_type = reader:story

        Però accettiamo anche semplicemente stories/...html,
        così resta compatibile con i dati già esportati.
      */
      const hasReaderStory = compactText.toLowerCase().includes("reader:story");
      const hasStoriesPath = url.toLowerCase().startsWith("stories/");

      if (!hasReaderStory && !hasStoriesPath) return null;

      const lines = popupText
        .split("\n")
        .map(x => x.trim())
        .filter(Boolean);

      let title = "Racconto";

      const titleIndex = lines.findIndex(x => x.toLowerCase() === "title");
      if (titleIndex >= 0 && lines[titleIndex + 1]) {
        title = lines[titleIndex + 1];
      }

      return { url, title };
    }

    function updateStoryButtonFromPopup() {
      const doc = getMapDocument();

      if (!doc || !doc.body) {
        hideStoryButton();
        return;
      }

      /*
        Non modifichiamo MAI il popup della mappa.
        Lo leggiamo soltanto: niente appendChild, niente remove, niente loop.
      */
      const popupCandidates = doc.querySelectorAll("#popup-content");
     /* const popupCandidates = doc.querySelectorAll(
        ".ol-popup, .ol-popup-content, .leaflet-popup-content, #popup, #popup-content"
      ); */

      let foundStory = null;

      popupCandidates.forEach(popup => {
        if (foundStory) return;

        const popupText = popup.innerText || popup.textContent || "";
        if (!popupText.trim()) return;

        const story = extractStoryFromPopupText(popupText);
        if (story) foundStory = story;
      });

      if (foundStory && foundStory.url) {
        showStoryButton(foundStory.url, foundStory.title);
      } else {
        hideStoryButton();
      }
    }

    function initReaderBridge() {
      const doc = getMapDocument();

      if (!doc || !doc.body) {
        showReaderError(
          "Reader: map/index.html non disponibile.",
          "Controlla che esista la cartella 'map' accanto a reader.html e che dentro ci sia 'index.html'."
        );
        return;
      }

      clearReaderError();
      hideStoryButton();

      if (popupObserver) popupObserver.disconnect();

      popupObserver = new MutationObserver(() => {
        updateStoryButtonFromPopup();
      });

      popupObserver.observe(doc.body, {
        childList: true,
        subtree: true,
        characterData: true
      });

      /*
        Niente polling: aggiorniamo solo quando l'utente interagisce con la mappa
        o quando qgis2web modifica il popup.
      */
      doc.addEventListener("click", () => {
        window.setTimeout(updateStoryButtonFromPopup, 0);
      }, true);

      doc.addEventListener("pointerup", () => {
        window.setTimeout(updateStoryButtonFromPopup, 0);
      }, true);

      updateStoryButtonFromPopup();
      console.log("[Narrative GIS Reader] Reader attivo: osserva il popup senza modificarlo.");
    }

        layer.setVisible(Boolean(visible));
        return true;

      // Leaflet fallback
      if (map && typeof layer.addTo === "function") {
        if (visible) {
          if (typeof map.hasLayer === "function") {
            if (!map.hasLayer(layer)) layer.addTo(map);
          } else if (typeof map.addLayer === "function") {
            map.addLayer(layer);
          }
        } else if (typeof map.removeLayer === "function") {
          map.removeLayer(layer);
        }
        return true;
      }

      // Fallback generico
      if ("visible" in layer) {
        layer.visible = Boolean(visible);
        return true;

      console.warn("[AtlasBridge] Non so cambiare visibilità a questo layer:", layer);

      function resolveGISLayerV2(logicalNameOrRealName) {

        if (!win || !logicalNameOrRealName) return null;

        if (typeof logicalNameOrRealName === "object") return logicalNameOrRealName;

        const registryValue = window.ATLAS_LAYER_REGISTRY?.[logicalNameOrRealName];

        const candidates = [
          logicalNameOrRealName,
          ...(Array.isArray(registryValue)
            ? registryValue
            : registryValue
              ? [registryValue]
              : [])
        ];

        // 1) Variabili globali qgis2web: win.lyr_...
        for (const candidate of candidates) {
          if (win[candidate]) return win[candidate];
        }

        // 2) Proprietà OpenLayers: title/name/layerName.
        const wanted = candidates.map(normalizeLayerName);

        for (const layer of getAllMapLayersV2()) {
          const layerNames = getLayerDeclaredNames(layer).map(normalizeLayerName);
          if (layerNames.some(name => wanted.includes(name))) return layer;
        }

        console.warn("[AtlasBridgeV2] Layer non risolto:", logicalNameOrRealName, {
          candidates,
          availableGlobals: Object.keys(win).filter(k => k.startsWith("lyr_")).sort(),
          availableTitles: getAllMapLayersV2().map(getLayerDeclaredNames)
        });

        return null;
      }

      function setLayerVisibleV2(layer, visible) {
        if (!layer) return false;

        if (typeof layer.setVisible === "function") {
          layer.setVisible(Boolean(visible));
          return true;
        }

        const win = getGISWindowV2();
        const map = getMapObjectV2(win);

        // Leaflet fallback.
        if (map && typeof layer.addTo === "function") {
          if (visible) {
            if (typeof map.hasLayer === "function") {
              if (!map.hasLayer(layer)) layer.addTo(map);
            } else if (typeof map.addLayer === "function") {
              map.addLayer(layer);
            }
          } else if (typeof map.removeLayer === "function") {
            map.removeLayer(layer);
          }

          return true;
        }

        return false;
      }

      window.showLayers = function(layerNames, options = {}) {
        const names = Array.isArray(layerNames) ? layerNames : [layerNames];
        let shown = 0;

        if (options.hideOthers === true) {
          for (const logicalName of Object.keys(window.ATLAS_LAYER_REGISTRY || {})) {
            if (!names.includes(logicalName)) {
              const layer = resolveGISLayerV2(logicalName);
              if (layer) setLayerVisibleV2(layer, false);
            }
          }
        }

        for (const name of names) {
          const layer = resolveGISLayerV2(name);
          if (layer && setLayerVisibleV2(layer, true)) shown++;
        }

        archiveQueryStatus.textContent = `layer accesi: ${shown}`;
        console.log("[AtlasBridgeV2] showLayers", names, "shown:", shown);
        return shown;
      };

      window.hideLayers = function(layerNames) {
        const names = Array.isArray(layerNames) ? layerNames : [layerNames];
        let hidden = 0;

        for (const name of names) {
          const layer = resolveGISLayerV2(name);
          if (layer && setLayerVisibleV2(layer, false)) hidden++;
        }

        archiveQueryStatus.textContent = `layer spenti: ${hidden}`;
        console.log("[AtlasBridgeV2] hideLayers", names, "hidden:", hidden);
        return hidden;
      };

      window.applyAtlasCommand = function(command = {}) {
        console.log("[AtlasBridgeV2] applyAtlasCommand", command);

        const result = {
          received: true,
          goto: false,
          shown: 0,
          hidden: 0,
          temporal_filter: false
        };

        if (command.goto || command.latitude || command.lat) {
          const target = command.goto || command;
          const lat = target.latitude ?? target.lat;
          const lon = target.longitude ?? target.lon ?? target.lng;
          const zoom = target.zoom ?? command.zoom;

          if (lat !== undefined && lon !== undefined && typeof window.gotoGIS === "function") {
            window.gotoGIS(Number(lat), Number(lon), zoom !== undefined ? Number(zoom) : undefined);
            result.goto = true;
          }
        }

        if (command.layers_off) {
          result.hidden = window.hideLayers(command.layers_off);
        }

        if (command.layers_on) {
          result.shown = window.showLayers(command.layers_on, {
            hideOthers: command.hide_others === true
          });
        }

        if (command.temporal_filter) {
          console.warn("[AtlasBridgeV2] Filtro temporale ricevuto ma non ancora implementato:", command.temporal_filter);
          archiveQueryStatus.textContent = `filtro temporale ricevuto: ${command.temporal_filter.year ?? "?"}`;
        }

        console.log("[AtlasBridgeV2] result", result);
        return result;
      };

      window.debugAtlasBridge = function() {
        const win = getGISWindowV2();

        const info = {
          gotoGIS: typeof window.gotoGIS,
          showLayers: typeof window.showLayers,
          hideLayers: typeof window.hideLayers,
          applyAtlasCommand: typeof window.applyAtlasCommand,
          gisLayerGlobals: win ? Object.keys(win).filter(k => k.startsWith("lyr_")).sort() : [],
          mapLayerTitles: getAllMapLayersV2().map(getLayerDeclaredNames),
          registry: window.ATLAS_LAYER_REGISTRY
        };

        console.log("[AtlasBridgeV2 debug]", info);
        return info;
      };

      console.log("[AtlasBridgeV2] caricato: registry reale + resolver OpenLayers/qgis2web");
    })();




    /* ------------------------------------------------------------------
       ATLAS BRIDGE V3 — resolver robusto per qgis2web

       Perché serve:
       qgis2web spesso genera variabili tipo:
       - lyr_qt_actors_12
       - lyr_ai_factories_8
       - lyr_nuclear_reactors_europe_all_37

       Il bridge precedente cercava soprattutto nomi esatti o _0.
       Qui invece risolviamo anche per prefisso/contiene sul nome normalizzato.
    ------------------------------------------------------------------ */

    (function installAtlasBridgeV3() {
      "use strict";

      const STRATEGIC_LAYER_REGISTRY = {
        qt_actors: ["qt_actors"],
        qt_infrastructures: ["qt_infrastructures"],
        qt_relations: ["qt_relations"],

        ai_actors: ["ai_actors"],
        ai_factories: ["ai_factories"],
        ai_relations: ["ai_relations"],

        ai_supercomputers: ["ai_supercomputers"],
        ai_compute_relations: ["ai_compute_relations"],

        energy_opsd_all_except_nuclear: ["energy_opsd_all_except_nuclear"],
        nuclear_reactors_europe_all: ["nuclear_reactors_europe_all"],

        // alias retrocompatibili
        nuclear_power_plants: ["nuclear_reactors_europe_all"],
        energy_nuclear: ["nuclear_reactors_europe_all"],
        reactors: ["nuclear_reactors_europe_all"]
      };

      window.ATLAS_LAYER_REGISTRY = Object.assign(
        {},
        window.ATLAS_LAYER_REGISTRY || {},
        STRATEGIC_LAYER_REGISTRY
      );

      function normalize(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "");
      }

      function compact(value) {
        return normalize(value).replaceAll("_", "");
      }

      function getGISWin() {
        try {
          return gisFrame?.contentWindow || getMapDocument()?.defaultView || null;
        } catch (err) {
          showReaderError(
            "AtlasBridgeV3: impossibile accedere alla finestra GIS.",
            "Reader e map/index.html devono stare sulla stessa origine/server locale."
          );
          return null;
        }
      }

      function getGISMap(win) {
        if (!win) return null;
        if (win.map && (typeof win.map.getView === "function" || typeof win.map.setView === "function")) {
          return win.map;
        }

        for (const key of Object.keys(win)) {
          try {
            const candidate = win[key];
            if (candidate && (typeof candidate.getView === "function" || typeof candidate.setView === "function")) {
              return candidate;
            }
          } catch (err) {}
        }

        return null;
      }

      function flattenLayers(collection, output = []) {
        if (!collection) return output;

        const arr = typeof collection.getArray === "function"
          ? collection.getArray()
          : Array.isArray(collection)
            ? collection
            : [];

        for (const layer of arr) {
          output.push(layer);
          try {
            if (layer && typeof layer.getLayers === "function") {
              flattenLayers(layer.getLayers(), output);
            }
          } catch (err) {}
        }

        return output;
      }

      function allMapLayers() {
        const win = getGISWin();
        const map = getGISMap(win);
        if (!map || typeof map.getLayers !== "function") return [];
        return flattenLayers(map.getLayers(), []);
      }

      function declaredLayerNames(layer) {
        const names = [];

        try {
          if (typeof layer.get === "function") {
            names.push(layer.get("title"));
            names.push(layer.get("name"));
            names.push(layer.get("layerName"));
            names.push(layer.get("id"));
          }

          if (typeof layer.getProperties === "function") {
            const props = layer.getProperties();
            names.push(props.title, props.name, props.layerName, props.id);
          }
        } catch (err) {}

        return names.filter(Boolean).map(String);
      }

      function candidatesFor(logicalName) {
        const registryValue = window.ATLAS_LAYER_REGISTRY?.[logicalName];

        const raw = [
          logicalName,
          ...(Array.isArray(registryValue)
            ? registryValue
            : registryValue
              ? [registryValue]
              : [])
        ].filter(Boolean);

        const expanded = [];

        for (const r of raw) {
          expanded.push(r);
          expanded.push("lyr_" + r);
          expanded.push("lyr_" + r + "_0");
        }

        // rimuovi duplicati
        return [...new Set(expanded)];
      }

      function scoreCandidateName(actualName, wantedName) {
        const actual = normalize(actualName);
        const wanted = normalize(wantedName);

        const actualCompact = compact(actualName);
        const wantedCompact = compact(wantedName);

        if (!actual || !wanted) return 0;

        // Match perfetto
        if (actual === wanted) return 100;
        if (actualCompact === wantedCompact) return 98;

        // qgis2web: lyr_nome_layer_12
        if (actual.startsWith(wanted + "_")) return 95;
        if (actual.startsWith("lyr_" + wanted + "_")) return 94;
        if (actualCompact.startsWith("lyr" + wantedCompact)) return 93;

        // contiene il nome del layer
        if (actual.includes(wanted)) return 80;
        if (actualCompact.includes(wantedCompact)) return 78;

        return 0;
      }

      function bestGlobalLayerMatch(logicalName) {
        const win = getGISWin();
        if (!win) return null;

        const wanted = candidatesFor(logicalName);
        const globalKeys = Object.keys(win).filter(k => k.startsWith("lyr_"));

        let best = { key: null, score: 0 };

        for (const key of globalKeys) {
          for (const candidate of wanted) {
            const score = scoreCandidateName(key, candidate);
            if (score > best.score) {
              best = { key, score };
            }
          }
        }

        if (best.key && best.score >= 78) {
          return {
            layer: win[best.key],
            source: "global",
            key: best.key,
            score: best.score
          };
        }

        return null;
      }

      function bestMapLayerMatch(logicalName) {
        const wanted = candidatesFor(logicalName);

        let best = { layer: null, name: null, score: 0 };

        for (const layer of allMapLayers()) {
          const names = declaredLayerNames(layer);

          for (const actualName of names) {
            for (const candidate of wanted) {
              const score = scoreCandidateName(actualName, candidate);
              if (score > best.score) {
                best = { layer, name: actualName, score };
              }
            }
          }
        }

        if (best.layer && best.score >= 78) {
          return {
            layer: best.layer,
            source: "mapLayerTitle",
            key: best.name,
            score: best.score
          };
        }

        return null;
      }

      function resolveLayer(logicalName) {
        const win = getGISWin();
        if (!win || !logicalName) return null;

        if (typeof logicalName === "object") {
          return {
            layer: logicalName,
            source: "object",
            key: "[object]",
            score: 100
          };
        }

        // 1) match globale esatto
        if (win[logicalName]) {
          return {
            layer: win[logicalName],
            source: "globalExact",
            key: logicalName,
            score: 100
          };
        }

        // 2) match globale fuzzy
        const globalMatch = bestGlobalLayerMatch(logicalName);
        if (globalMatch) return globalMatch;

        // 3) match su title/name OpenLayers
        const mapMatch = bestMapLayerMatch(logicalName);
        if (mapMatch) return mapMatch;

        console.warn("[AtlasBridgeV3] Layer non risolto:", logicalName, {
          candidates: candidatesFor(logicalName),
          availableGlobals: Object.keys(win).filter(k => k.startsWith("lyr_")).sort(),
          availableTitles: allMapLayers().map(declaredLayerNames)
        });

        return null;
      }

      function setLayerVisible(layer, visible) {
        if (!layer) return false;

        if (typeof layer.setVisible === "function") {
          layer.setVisible(Boolean(visible));
          return true;
        }

        const win = getGISWin();
        const map = getGISMap(win);

        if (map && typeof layer.addTo === "function") {
          if (visible) {
            if (typeof map.hasLayer === "function") {
              if (!map.hasLayer(layer)) layer.addTo(map);
            } else if (typeof map.addLayer === "function") {
              map.addLayer(layer);
            }
          } else if (typeof map.removeLayer === "function") {
            map.removeLayer(layer);
          }

          return true;
        }

        if ("visible" in layer) {
          layer.visible = Boolean(visible);
          return true;
        }

        return false;
      }

      function strategicLogicalNames() {
        return Object.keys(STRATEGIC_LAYER_REGISTRY);
      }

      window.showLayers = function(layerNames, options = {}) {
        const names = Array.isArray(layerNames) ? layerNames : [layerNames];
        const resolved = [];
        let shown = 0;
        let hidden = 0;

        // hideOthers: spegne SOLO i layer strategici registrati,
        // non tutti i layer del progetto, così non tocchiamo basemap o layer narrativi.
        if (options.hideOthers === true) {
          for (const logicalName of strategicLogicalNames()) {
            if (!names.includes(logicalName)) {
              const match = resolveLayer(logicalName);
              if (match?.layer && setLayerVisible(match.layer, false)) {
                hidden++;
              }
            }
          }
        }

        for (const name of names) {
          const match = resolveLayer(name);

          if (match?.layer && setLayerVisible(match.layer, true)) {
            shown++;
            resolved.push({
              requested: name,
              resolved: match.key,
              source: match.source,
              score: match.score
            });
          } else {
            resolved.push({
              requested: name,
              resolved: null,
              source: null,
              score: 0
            });
          }
        }

        archiveQueryStatus.textContent = `layer accesi: ${shown}`;
        console.log("[AtlasBridgeV3] showLayers", { names, shown, hidden, resolved });
        return {
          shown,
          hidden,
          resolved
        };
      };

      window.hideLayers = function(layerNames) {
        const names = Array.isArray(layerNames) ? layerNames : [layerNames];
        const resolved = [];
        let hidden = 0;

        for (const name of names) {
          const match = resolveLayer(name);

          if (match?.layer && setLayerVisible(match.layer, false)) {
            hidden++;
            resolved.push({
              requested: name,
              resolved: match.key,
              source: match.source,
              score: match.score
            });
          } else {
            resolved.push({
              requested: name,
              resolved: null,
              source: null,
              score: 0
            });
          }
        }

        archiveQueryStatus.textContent = `layer spenti: ${hidden}`;
        console.log("[AtlasBridgeV3] hideLayers", { names, hidden, resolved });
        return {
          hidden,
          resolved
        };
      };

      window.applyAtlasCommand = function(command = {}) {
        console.log("[AtlasBridgeV3] applyAtlasCommand", command);

        const result = {
          received: true,
          goto: false,
          shown: 0,
          hidden: 0,
          temporal_filter: false,
          resolved: []
        };

        if (command.goto || command.latitude || command.lat) {
          const target = command.goto || command;
          const lat = target.latitude ?? target.lat;
          const lon = target.longitude ?? target.lon ?? target.lng;
          const zoom = target.zoom ?? command.zoom;

          if (lat !== undefined && lon !== undefined && typeof window.gotoGIS === "function") {
            window.gotoGIS(Number(lat), Number(lon), zoom !== undefined ? Number(zoom) : undefined);
            result.goto = true;
          }
        }

        if (command.layers_off) {
          const hideResult = window.hideLayers(command.layers_off);
          result.hidden += hideResult.hidden || 0;
          result.resolved.push(...(hideResult.resolved || []));
        }

        if (command.layers_on) {
          const showResult = window.showLayers(command.layers_on, {
            hideOthers: command.hide_others === true
          });
          result.shown += showResult.shown || 0;
          result.hidden += showResult.hidden || 0;
          result.resolved.push(...(showResult.resolved || []));
        }

        if (command.temporal_filter) {
          console.warn("[AtlasBridgeV3] Filtro temporale ricevuto ma non ancora implementato:", command.temporal_filter);
          archiveQueryStatus.textContent = `filtro temporale ricevuto: ${command.temporal_filter.year ?? "?"}`;
        }

        console.log("[AtlasBridgeV3] result", result);
        return result;
      };

      window.debugAtlasBridge = function() {
        const win = getGISWin();

        const strategicResolutions = {};
        for (const name of strategicLogicalNames()) {
          const match = resolveLayer(name);
          strategicResolutions[name] = match
            ? { resolved: match.key, source: match.source, score: match.score }
            : null;
        }

        const info = {
          gotoGIS: typeof window.gotoGIS,
          showLayers: typeof window.showLayers,
          hideLayers: typeof window.hideLayers,
          applyAtlasCommand: typeof window.applyAtlasCommand,
          gisLayerGlobals: win ? Object.keys(win).filter(k => k.startsWith("lyr_")).sort() : [],
          mapLayerTitles: allMapLayers().map(declaredLayerNames),
          strategicResolutions,
          registry: window.ATLAS_LAYER_REGISTRY
        };

        console.log("[AtlasBridgeV3 debug]", info);
        return info;
      };

      console.log("[AtlasBridgeV3] caricato: resolver fuzzy per layer qgis2web");
    })();


    gisFrame.addEventListener("load", initReaderBridge);
    loadArchiveJsons();

    gisFrame.addEventListener("error", () => {
      showReaderError(
        "Reader: errore nel caricamento della mappa.",
        "Percorso atteso: map/index.html. Controlla struttura cartelle e nomi file."
      );
    });

    window.setTimeout(() => {
      if (!gisFrame.contentDocument && !gisFrame.contentWindow) {
        showReaderError(
          "Reader: iframe non inizializzato.",
          "Apri il progetto tramite un server locale, non trascinando direttamente il file nel browser."
        );
      }
    }, 2500);
  </script>
